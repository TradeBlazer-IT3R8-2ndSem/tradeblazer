version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: tradablazer_backend
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=tradeblazer
      - DB_USER=tradablazer_user
      - DB_PASSWORD=tradeblazer123

  frontend:
    build:
      context: ./frontend
    container_name: tradablazer_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    image: nginx:latest
    container_name: tradablazer_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  mysql:
    image: mysql:8.0
    container_name: tradablazer_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tradeblazer
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_PASSWORD: tradeblazer123
      MYSQL_USER: tradablazer_user
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: tradablazer_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
